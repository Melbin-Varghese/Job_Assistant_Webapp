<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .coming-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        h1 {
            font-weight: bold;
            margin-bottom: 15px;
        }

        p {
            color: #6c757d;
            font-size: 18px;
        }

        .btn-home {
            margin-top: 25px;
            padding: 10px 30px;
            border-radius: 30px;
        }
    </style>
</head>

<body>

    <div class="coming-card">
        

        <h1>Feature Coming Soon!</h1>

        <p>
            We're working hard to bring you this feature.
            It will be available in a future update.
        </p>

        <button type="button" class="btn btn-outline" onclick="history.back()" class="btn btn-ghost">Back</button>
    </div>

</body>

</html>
